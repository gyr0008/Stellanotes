name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'main'
  workflow_dispatch:

jobs:
  build:
    # windows-latest 在 2026 年默认仅含 VS 2025（主版本 18），Flutter 3.24 的 cmakeGenerator
    # 只识别到 VS 17，其余一律回退到 "Visual Studio 16 2019" 生成器，导致 CMake 找不到 VS 实例。
    # 固定到 windows-2022 可保证装有 VS 2022 + Desktop C++ 工作负载，Flutter 选用
    # "Visual Studio 17 2022" 生成器，构建正常。
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (drift/riverpod)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Analyze
        # 仅对真正的编译错误（error 级）失败；风格类 lint（warning/info）不阻断构建。
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        run: flutter test

      - name: Build Windows
        run: flutter build windows --release

      - name: Create ZIP
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "stargazer-windows.zip"

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: stargazer-windows
          path: stargazer-windows.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: stargazer-windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
