name: stargazer
description: 日记与待办融合的星空图谱应用
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 路由
  go_router: ^14.2.0

  # 本地数据库
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Markdown
  flutter_markdown: ^0.7.3+1
  markdown: ^7.2.2

  # 毛玻璃效果
  flutter_floating: ^2.0.2

  # 颜色选择器
  flutter_colorpicker: ^1.1.0

  # 动画
  flutter_animate: ^4.5.0

  # 图表
  fl_chart: ^0.68.0

  # 分享
  share_plus: ^7.2.2

  # 文件选择
  file_picker: ^8.0.3

  # 工具
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  
  # 自动更新
  http: ^1.2.0
  package_info_plus: ^5.0.1
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  shaders:
    - lib/features/starmap/shaders/starfield.frag
    - lib/features/starmap/shaders/frosted_glass.frag

  assets:
    - assets/images/
    - assets/icons/
